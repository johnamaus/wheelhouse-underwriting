            ) : Object.keys(pmTemplates).length > 0 ? (
              <div style={{position:'relative'}}>
                <button onClick={()=>setShowPmSelect(!showPmSelect)} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 10px',fontSize:11,fontWeight:500,cursor:'pointer',color:'var(--text-sec)'}}>Select Template</button>
                {showPmSelect && (
                  <div style={{position:'absolute',top:'100%',right:0,marginTop:4,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,boxShadow:'0 4px 12px rgba(0,0,0,0.1)',zIndex:10,minWidth:160,padding:4}}>
                    {Object.keys(pmTemplates).map(name => (
                      <div key={name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,padding:'6px 8px',borderRadius:4}}>
                        <button onClick={()=>loadPmTemplate(name)} style={{background:'none',border:'none',color:'var(--text)',fontSize:12,fontWeight:500,cursor:'pointer',flex:1,textAlign:'left',padding:0}}>{name}</button>
                        <button onClick={(e)=>{e.stopPropagation();deletePmTemplate(name);}} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:13,lineHeight:1}} title="Delete">&times;</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ) : null}
            {!activePmTpl && (showSavePm ? (
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <input value={pmTplName} onChange={e=>setPmTplName(e.target.value)} placeholder="Template name" onKeyDown={e=>e.key==='Enter'&&savePmTemplate()} style={{...inputStyle,width:130,padding:'4px 8px',fontSize:11}} />
                <button onClick={savePmTemplate} disabled={!pmTplName.trim()} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:5,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer'}}>Save</button>
                <button onClick={()=>setShowSavePm(false)} style={{background:'none',border:'1px solid var(--border)',borderRadius:5,padding:'4px 8px',fontSize:11,cursor:'pointer',color:'var(--text-muted)'}}>Cancel</button>
              </div>
            ) : companyName ? (
              <button onClick={()=>setShowSavePm(true)} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 10px',fontSize:11,fontWeight:500,cursor:'pointer',color:'var(--text-sec)'}}>Save as Template</button>
            ) : null)}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div>
            <label style={labelStyle}>Company Name</label>
            <input value={companyName} onChange={e=>setCompanyName(e.target.value)} placeholder="e.g. Wheelhouse" style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>Company Logo</label>
            <input type="file" accept="image/*" onChange={handleFileUpload(setCompanyLogo)} style={{fontSize:13}} />
            {companyLogo && <img src={companyLogo} style={{marginTop:8,maxHeight:40}} alt="Logo preview" />}
          </div>
          <div style={{gridColumn:'1/-1'}}>
            <label style={labelStyle}>Company Banner Image</label>
            <input type="file" accept="image/*" onChange={handleFileUpload(setCompanyImage)} style={{fontSize:13}} />
            {companyImage && <img src={companyImage} style={{marginTop:8,maxHeight:100,borderRadius:8,objectFit:'cover',width:'100%'}} alt="Banner preview" />}
          </div>
          <div style={{gridColumn:'1/-1'}}>
            <label style={labelStyle}>Company Description</label>
            <textarea value={companyDesc} onChange={e=>setCompanyDesc(e.target.value)} rows={3} placeholder="Brief description of your company..." style={{...inputStyle,resize:'vertical'}} />
          </div>
          <div style={{gridColumn:'1/-1'}}>
            <label style={labelStyle}>Highlights / Points of Differentiation</label>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <input value={highlight1} onChange={e=>setHighlight1(e.target.value)} placeholder="Highlight 1" style={inputStyle} />
              <input value={highlight2} onChange={e=>setHighlight2(e.target.value)} placeholder="Highlight 2" style={inputStyle} />
              <input value={highlight3} onChange={e=>setHighlight3(e.target.value)} placeholder="Highlight 3" style={inputStyle} />
            </div>
          </div>
        </div>
      </div>

      {/* Sales Agent */}
      <div style={sectionStyle}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
          <h3 style={{fontSize:15,fontWeight:700,margin:0}}>Sales Agent</h3>
          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',position:'relative'}}>
            {activeAgentTpl ? (
              <React.Fragment>
                <span style={{background:'var(--accent-bg)',color:'var(--accent)',border:'1px solid var(--accent-light)',borderRadius:6,padding:'3px 10px',fontSize:11,fontWeight:600}}>{activeAgentTpl}</span>
                <button onClick={()=>{setActiveAgentTpl('');setAgentName('');setAgentImage(null);setAgentEmail('');setAgentPhone('');}} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:13,lineHeight:1}} title="Clear template">&times;</button>
              </React.Fragment>
            ) : Object.keys(agentTemplates).length > 0 ? (
              <div style={{position:'relative'}}>
                <button onClick={()=>setShowAgentSelect(!showAgentSelect)} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 10px',fontSize:11,fontWeight:500,cursor:'pointer',color:'var(--text-sec)'}}>Select Template</button>
                {showAgentSelect && (
                  <div style={{position:'absolute',top:'100%',right:0,marginTop:4,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,boxShadow:'0 4px 12px rgba(0,0,0,0.1)',zIndex:10,minWidth:160,padding:4}}>
                    {Object.keys(agentTemplates).map(name => (
                      <div key={name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,padding:'6px 8px',borderRadius:4}}>
                        <button onClick={()=>loadAgentTemplate(name)} style={{background:'none',border:'none',color:'var(--text)',fontSize:12,fontWeight:500,cursor:'pointer',flex:1,textAlign:'left',padding:0}}>{name}</button>
                        <button onClick={(e)=>{e.stopPropagation();deleteAgentTemplate(name);}} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:13,lineHeight:1}} title="Delete">&times;</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ) : null}
            {!activeAgentTpl && (showSaveAgent ? (
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <input value={agentTplName} onChange={e=>setAgentTplName(e.target.value)} placeholder="Template name" onKeyDown={e=>e.key==='Enter'&&saveAgentTemplate()} style={{...inputStyle,width:130,padding:'4px 8px',fontSize:11}} />
                <button onClick={saveAgentTemplate} disabled={!agentTplName.trim()} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:5,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer'}}>Save</button>
                <button onClick={()=>setShowSaveAgent(false)} style={{background:'none',border:'1px solid var(--border)',borderRadius:5,padding:'4px 8px',fontSize:11,cursor:'pointer',color:'var(--text-muted)'}}>Cancel</button>
              </div>
            ) : agentName ? (
              <button onClick={()=>setShowSaveAgent(true)} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 10px',fontSize:11,fontWeight:500,cursor:'pointer',color:'var(--text-sec)'}}>Save as Template</button>
            ) : null)}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div>
            <label style={labelStyle}>Agent Name</label>
            <input value={agentName} onChange={e=>setAgentName(e.target.value)} placeholder="e.g. Jane Doe" style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>Agent Photo</label>
            <input type="file" accept="image/*" onChange={handleFileUpload(setAgentImage)} style={{fontSize:13}} />
            {agentImage && <img src={agentImage} style={{marginTop:8,height:50,width:50,borderRadius:'50%',objectFit:'cover'}} alt="Agent preview" />}
          </div>
          <div>
            <label style={labelStyle}>Email</label>
            <input type="email" value={agentEmail} onChange={e=>setAgentEmail(e.target.value)} placeholder="agent@company.com" style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>Phone</label>
            <input type="tel" value={agentPhone} onChange={e=>setAgentPhone(e.target.value)} placeholder="(555) 123-4567" style={inputStyle} />
          </div>
        </div>
      </div>

      {/* Comp Selection */}
      <div style={sectionStyle}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
          <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
            <input type="checkbox" checked={includeComps} onChange={e=>setIncludeComps(e.target.checked)} style={{accentColor:'var(--accent)'}} />
            <span style={{fontSize:15,fontWeight:700}}>Include Detailed Comp Page</span>
          </label>
          <span style={{fontSize:12,color:'var(--text-muted)'}}>(optional)</span>
        </div>
        {includeComps && (
          <div>
            <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:10}}>Select up to 5 comps to feature in the report:</p>
            {selectedComps.length === 0 && <p style={{fontSize:13,color:'var(--text-muted)'}}>No comps selected. Go to the Comps tab and select properties first.</p>}
            <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:300,overflowY:'auto'}}>
              {selectedComps.map(c => {
                const id = c.listing_id || c.comp_id || c.id;
                const isChecked = reportComps.has(id);
                return (
                  <label key={id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background: isChecked?'var(--accent-bg)':'var(--surface2)',border:'1px solid '+(isChecked?'var(--accent-light)':'var(--border)'),borderRadius:8,cursor:'pointer',fontSize:13}}>
                    <input type="checkbox" checked={isChecked} onChange={()=>toggleComp(id)} disabled={!isChecked && reportComps.size >= 5} style={{accentColor:'var(--accent)'}} />
                    <span style={{fontWeight:500,flex:1}}>{c.title || 'Comp'}</span>
                    <span style={{color:'var(--text-muted)',fontSize:12}}>{c.bedrooms}BR · ${Math.round(c.nrevenue_365_0||0).toLocaleString()}/yr</span>
                  </label>
                );
              })}
            </div>
            {reportComps.size > 0 && <p style={{fontSize:11,color:'var(--text-muted)',marginTop:6}}>{reportComps.size}/5 selected</p>}
          </div>
        )}
      </div>

      {/* Generate Button */}
      <button onClick={handleGenerate} disabled={generating || !hasProjection} style={{
        width:'100%', background: hasProjection?'var(--accent)':'var(--border)', color: hasProjection?'#fff':'var(--text-muted)',
        border:'none', borderRadius:10, padding:'14px 20px', fontSize:15, fontWeight:700, cursor: hasProjection?'pointer':'not-allowed',
        marginBottom:40
      }}>
        {generating ? 'Generating...' : 'Preview Report'}
      </button>

      {/* Preview Modal */}
      {previewHtml && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',zIndex:9999,display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div style={{background:'var(--surface)',padding:'10px 20px',display:'flex',alignItems:'center',gap:12,width:'100%',borderBottom:'1px solid var(--border)',justifyContent:'center'}}>
            <button onClick={handleDownloadPDF} disabled={generating} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:8,padding:'8px 20px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
              {generating ? 'Generating PDF...' : 'Download PDF'}
            </button>
            <button onClick={()=>setPreviewHtml(null)} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 20px',fontSize:13,fontWeight:500,cursor:'pointer',color:'var(--text-sec)'}}>
              Close Preview
            </button>
          </div>
          <div style={{flex:1,overflow:'auto',padding:'20px 0',display:'flex',justifyContent:'center',width:'100%'}}>
            <div style={{width:'8.5in',background:'#fff',boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>
              <iframe
                srcDoc={previewHtml}
                style={{width:'8.5in',height:'100%',minHeight:'90vh',border:'none'}}
                title="Report Preview"
              />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════ REPORT PDF GENERATION ═══════════════ */
function buildRangeChartSVG(title, monthlyData, formatter, color) {
  // monthlyData = { conservative: [12 values], base: [12 values], aggressive: [12 values] }
  const W = 500, H = 180, PAD_L = 50, PAD_R = 15, PAD_T = 25, PAD_B = 30;
  const chartW = W - PAD_L - PAD_R, chartH = H - PAD_T - PAD_B;

  const allVals = [...monthlyData.conservative, ...monthlyData.base, ...monthlyData.aggressive];
  const minV = Math.min(...allVals) * 0.9;
  const maxV = Math.max(...allVals) * 1.05;
  const range = maxV - minV || 1;

  const x = (i) => PAD_L + (i / 11) * chartW;
  const y = (v) => PAD_T + chartH - ((v - minV) / range) * chartH;

  const shadedPath = MONTHS.map((_, i) => `${x(i)},${y(monthlyData.aggressive[i])}`).join(' ') + ' ' +
    [...MONTHS].reverse().map((_, ri) => { const i = 11 - ri; return `${x(i)},${y(monthlyData.conservative[i])}`; }).join(' ');

  const baseLine = MONTHS.map((_, i) => `${x(i)},${y(monthlyData.base[i])}`).join(' ');

  // Y-axis ticks
  const ticks = 5;
  const yTicks = Array.from({length: ticks}, (_, i) => minV + (range * i / (ticks - 1)));

  return `
    <svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:-apple-system,sans-serif;">
      <text x="${W/2}" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#1d1d1f">${title}</text>
      <!-- Grid lines -->
      ${yTicks.map(v => `<line x1="${PAD_L}" y1="${y(v)}" x2="${W-PAD_R}" y2="${y(v)}" stroke="#e5e5ea" stroke-width="0.5"/>`).join('')}
      <!-- Shaded range -->
      <polygon points="${shadedPath}" fill="${color}" opacity="0.15" />
      <!-- Base line -->
      <polyline points="${baseLine}" fill="none" stroke="${color}" stroke-width="2.5" />
      <!-- Dots on base -->
      ${MONTHS.map((_, i) => `<circle cx="${x(i)}" cy="${y(monthlyData.base[i])}" r="2.5" fill="${color}" />`).join('')}
      <!-- X-axis labels -->
      ${MONTHS.map((m, i) => `<text x="${x(i)}" y="${H - 5}" text-anchor="middle" font-size="7" fill="#6e6e73">${m}</text>`).join('')}
      <!-- Y-axis labels -->
      ${yTicks.map(v => `<text x="${PAD_L - 5}" y="${y(v) + 3}" text-anchor="end" font-size="7" fill="#6e6e73">${formatter(v)}</text>`).join('')}
      <!-- Legend -->
      <rect x="${PAD_L}" y="${H - 14}" width="8" height="8" fill="${color}" opacity="0.2" rx="1"/>
      <text x="${PAD_L + 12}" y="${H - 7}" font-size="7" fill="#6e6e73">Conservative – Aggressive Range</text>
      <line x1="${PAD_L + 170}" y1="${H - 10}" x2="${PAD_L + 185}" y2="${H - 10}" stroke="${color}" stroke-width="2"/>
      <text x="${PAD_L + 189}" y="${H - 7}" font-size="7" fill="#6e6e73">Base Case</text>
    </svg>`;
}

    SEASON_REV: FALLBACK_SEASON_REV, SEASON_OCC: FALLBACK_SEASON_OCC,
    SEASON_ADR: FALLBACK_SEASON_ADR, SEASON_LOS: FALLBACK_SEASON_LOS
  };

  const _pn = parseFloat(pm.perNightFee) || 0;
  const _ps = parseFloat(pm.perStayFee) || 0;
  const _pp = parseFloat(pm.pctFee) || 0;

  const computeMonthly = (annualGross, scenarioMult) => {
    if (!projection) return { rental: annualGross, fees: 0, monthly: [] };
    const mult = scenarioMult || 1.0;
    const medOcc = projection.medOcc || 0, medLOS = projection.medLOS || 1;
    let totalFees = 0;
    const monthlyData = [];
    MONTHS.forEach((m, i) => {
      const grossRev = annualGross * mult * SEASON_REV[i] / 12;
      const occ = Math.min(medOcc * SEASON_OCC[i], 1.0);
      const occN = Math.round(DAYS_IN_MONTH[i] * occ);
      const los = medLOS * SEASON_LOS[i];
      const stays = los > 0 ? occN / los : 0;
      const nightFees = occN * _pn;
      const stayFees = stays * _ps;
      const revFees = grossRev * (_pp / 100);
      const mFees = nightFees + stayFees + revFees;
      totalFees += mFees;
      monthlyData.push({ month: MONTHS[i], grossRev, occN, occ, los, stays, totalFees: mFees, rental: grossRev - mFees });
    });
    return { rental: annualGross * mult - totalFees, fees: totalFees, monthly: monthlyData };

async function downloadReportPDF(htmlContent, propertyAddress) {
  // Strip @import (html2canvas can't load external fonts via @import)
  const cleanHtml = htmlContent.replace(/@import url\([^)]+\);?\s*/g, '');

  const tempDiv = document.createElement('div');
  tempDiv.style.position = 'absolute';
  tempDiv.style.left = '0';
  tempDiv.style.top = '0';
  tempDiv.style.width = '816px'; // 8.5in at 96dpi
  tempDiv.style.zIndex = '-9999';
  tempDiv.style.opacity = '0';
  tempDiv.style.pointerEvents = 'none';
  tempDiv.innerHTML = cleanHtml;
  document.body.appendChild(tempDiv);

  // Wait for images to load
  const imgs = tempDiv.querySelectorAll('img');
  await Promise.all([...imgs].map(img => {
    if (img.complete) return Promise.resolve();
    return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
  }));
  // Small delay for rendering
  await new Promise(r => setTimeout(r, 300));

  const safeAddr = (propertyAddress || 'report').replace(/[^a-zA-Z0-9]/g, '_').substring(0, 40);
  const pages = tempDiv.querySelectorAll('.page');
  if (pages.length === 0) {
    console.error('No .page elements found in report HTML');
    document.body.removeChild(tempDiv);
    return;
  }

  const pdf = new jspdf.jsPDF({ unit: 'mm', format: 'letter', orientation: 'portrait' });
  const pageW = 215.9; // letter width mm
  const pageH = 279.4; // letter height mm

  for (let i = 0; i < pages.length; i++) {
    if (i > 0) pdf.addPage();
    const canvas = await html2canvas(pages[i], {
      scale: 2,
      useCORS: true,
      letterRendering: true,
      width: 816,
      windowWidth: 816,
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    pdf.addImage(imgData, 'JPEG', 0, 0, pageW, pageH);
  }

  pdf.save(`${safeAddr}_revenue_report.pdf`);
  document.body.removeChild(tempDiv);
}

          {searchMode==='address'&&(

              <div><label style={{fontSize:11,color:'var(--text-muted)'}}>Max Beds</label><input type="number" value={filters.maxBed} onChange={e=>setFilters(p=>({...p,maxBed:e.target.value}))} style={{...inputStyle,marginTop:4}} /></div>

      {/* ════ COMPS + MAP ════ */}

          {/* Main content */}

                {/* Widgets overlay */}
                {showWidgets && (

                <div style={{display:'flex',gap:6}}>

          {/* Right filters sidebar — sticky */}
          <div style={{position:'sticky',top:16,alignSelf:'flex-start'}}>
            <FiltersPanel filters={filters} applyFilters={applyFilters} roomTypes={selRoomTypes} setRoomTypes={setSelRoomTypes} amenities={selAmenities} setAmenities={setSelAmenities} availableAmenities={availableAmenities} onClear={clearFilters} totalCount={comps.length} filteredCount={filteredComps.length} />
          </div>
        </div>
      )}

      {/* ════ PM SETUP ════ */}
      {view==='pm'&&(
        <div style={{maxWidth:600,margin:'0 auto'}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:24}}>
            <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Property Management Company</div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:20}}>Enter the PM fee structure.</div>

            <div style={{fontSize:13,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:12}}>Fee Structure</div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:20}}>
              <div>
                <label style={{fontSize:12,color:'var(--text-sec)',fontWeight:500,display:'block',marginBottom:4}}>Per Stay Fee</label>
                <div style={{position:'relative'}}>
                  <span style={{position:'absolute',left:10,top:9,color:'var(--text-muted)',fontSize:14}}>$</span>
                  <input type="number" step="0.01" value={pmCompany.perStayFee} onChange={e=>updatePM('perStayFee',e.target.value)} placeholder="e.g. 150" style={{...inputStyle,paddingLeft:24}} />
                </div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>Cleaning fee, etc.</div>
              </div>
              <div>
                <label style={{fontSize:12,color:'var(--text-sec)',fontWeight:500,display:'block',marginBottom:4}}>Per Night Fee</label>
                <div style={{position:'relative'}}>
                  <span style={{position:'absolute',left:10,top:9,color:'var(--text-muted)',fontSize:14}}>$</span>
                  <input type="number" step="0.01" value={pmCompany.perNightFee} onChange={e=>updatePM('perNightFee',e.target.value)} placeholder="e.g. 25" style={{...inputStyle,paddingLeft:24}} />
                </div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>Nightly surcharge</div>
              </div>
              <div>
                <label style={{fontSize:12,color:'var(--text-sec)',fontWeight:500,display:'block',marginBottom:4}}>% Fee</label>
                <div style={{position:'relative'}}>
                  <input type="number" step="0.1" value={pmCompany.pctFee} onChange={e=>updatePM('pctFee',e.target.value)} placeholder="e.g. 20" style={{...inputStyle,paddingRight:28}} />
                  <span style={{position:'absolute',right:10,top:9,color:'var(--text-muted)',fontSize:14}}>%</span>
                </div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>% of gross revenue</div>
              </div>
            </div>

            {/* Summary preview */}
            {(pmCompany.perStayFee || pmCompany.perNightFee || pmCompany.pctFee) && (
              <div style={{background:'var(--accent-bg)',border:'1px solid var(--accent-light)',borderRadius:10,padding:14,marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:6}}>Fee Summary</div>
                <div style={{fontSize:13,color:'var(--text)'}}>
                  {pmCompany.name && <span style={{fontWeight:600}}>{pmCompany.name}: </span>}
                  {[
                    pmCompany.perStayFee && `$${pmCompany.perStayFee}/stay`,
                    pmCompany.perNightFee && `$${pmCompany.perNightFee}/night`,
                    pmCompany.pctFee && `${pmCompany.pctFee}% of revenue`,
                  ].filter(Boolean).join(' + ') || 'No fees entered'}
                </div>
              </div>
            )}

            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setView('comps')} style={{flex:1,padding:12,border:'1px solid var(--border)',borderRadius:8,background:'var(--surface)',cursor:'pointer',fontSize:14,fontWeight:600}}>
                ← Back to Comps
              </button>
              <button onClick={()=>setView('projection')} style={{flex:1,padding:12,border:'none',borderRadius:8,background:'var(--accent)',color:'#fff',cursor:'pointer',fontSize:14,fontWeight:600,opacity:selectedComps.length>=MIN_COMPS?1:0.4}} disabled={selectedComps.length<MIN_COMPS}>
                {selectedComps.length<MIN_COMPS ? `Need ${MIN_COMPS - selectedComps.length} more comp(s)` : 'View Projection →'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ════ PROJECTION ════ */}
      {view==='projection'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* Navigation bar */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button onClick={()=>setView('pm')} style={{display:'flex',alignItems:'center',gap:6,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',color:'var(--text)'}}>
              ← Back to PM Setup
            </button>
            <div style={{fontSize:12,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:8}}>
              {selectedComps.length} comps selected
              {pmCompany.name && ` · PM: ${pmCompany.name}`}
              {projection && (
                <span style={{display:'inline-flex',alignItems:'center',gap:4,background:projection.seasonSource==='market_report'?'rgba(46,160,67,0.1)':'rgba(200,150,50,0.1)',color:projection.seasonSource==='market_report'?'#2ea043':'#c89632',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:600}}>
                  {projection.seasonSource==='market_report' ? '📈 Market Seasonality' : '📉 Generic Seasonality'}
                </span>
              )}
            </div>
          </div>

          {/* Seasonality diagnostic panel */}
          {projection && projection.seasonFactors && (
            <details style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',fontSize:12}}>
              <summary style={{cursor:'pointer',fontWeight:600,color:'var(--text-sec)',fontSize:12}}>
                Seasonality Factors — {projection.seasonSource==='market_report' ? `Market Report (ID: ${seasonality?.marketId})` : 'Generic Fallback'}
              </summary>
              <div style={{marginTop:10,overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,fontFamily:'monospace'}}>
                  <thead>
                    <tr style={{borderBottom:'1px solid var(--border)'}}>
                      <th style={{textAlign:'left',padding:'4px 8px'}}>Metric</th>
                      {MONTHS.map(m=><th key={m} style={{textAlign:'center',padding:'4px 6px'}}>{m}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {[['Revenue',projection.seasonFactors.SEASON_REV],['Occupancy',projection.seasonFactors.SEASON_OCC],['ADR',projection.seasonFactors.SEASON_ADR],['LOS',projection.seasonFactors.SEASON_LOS]].map(([label,arr])=>(
                      <tr key={label} style={{borderBottom:'1px solid var(--border-light)'}}>
                        <td style={{padding:'4px 8px',fontWeight:600}}>{label}</td>
                        {arr.map((v,i)=><td key={i} style={{textAlign:'center',padding:'4px 6px',color:v>1?'#2ea043':v<1?'#c89632':'var(--text)'}}>{v.toFixed(3)}</td>)}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </details>
          )}

          {selectedComps.length < MIN_COMPS ? (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:60,textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:10}}>📊</div>
              <div style={{fontSize:15,fontWeight:600}}>Minimum {MIN_COMPS} comps required</div>
              <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>You have {selectedComps.length} comp(s) selected. Go back and select at least {MIN_COMPS}.</div>
              <button onClick={()=>setView('comps')} style={{marginTop:14,padding:'8px 20px',background:'var(--accent)',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer'}}>Select Comps</button>
            </div>
          ) : projection ? (() => {
            /* ── Compute rental-basis summary metrics from base-case monthly data ── */
            const { SEASON_REV: _SR, SEASON_OCC: _SO, SEASON_LOS: _SL } = projection.seasonFactors;
            const _pn = parseFloat(pmCompany.perNightFee) || 0;
            const _ps = parseFloat(pmCompany.perStayFee) || 0;
            const _pp = parseFloat(pmCompany.pctFee) || 0;
            const _hasFees = _pn || _ps || _pp;
            const _computeRentalFromGross = (annualGross) => {
              if (!_hasFees || !projection.medOcc || !projection.medLOS) return annualGross;
              let totalFees = 0;
              MONTHS.forEach((m, i) => {
                const monthRev = annualGross * _SR[i] / 12;
                const occ = Math.min(projection.medOcc * _SO[i], 1.0);
                const occNights = Math.round(DAYS_IN_MONTH[i] * occ);
                const los = projection.medLOS * _SL[i];
                const stays = los > 0 ? occNights / los : 0;
                totalFees += occNights * _pn + stays * _ps + monthRev * (_pp / 100);
              });
              return annualGross - totalFees;
            };
            /* Base case = 100% of median, so base rental revenue IS median rental revenue */
            const baseSc = projection.monthly.base;
            const _baseMonthly = baseSc.slice(0, 12).map(row => {
              const occNights = row.occupiedNights || 0;
              const los = row.los || 1;
              const stays = los > 0 ? occNights / los : 0;
              const fees = occNights * _pn + stays * _ps + row.revenue * (_pp / 100);
              return { rev: row.revenue, occ: row.occupancy, occNights, netRev: row.revenue - fees };
            });
            const _medianRentalRev = _baseMonthly.reduce((s, d) => s + d.netRev, 0);
            const _totalOccNights = _baseMonthly.reduce((s, d) => s + d.occNights, 0);
            const _medianRentalADR = _totalOccNights > 0 ? _medianRentalRev / _totalOccNights : 0;
            const _medianRevPAR = _medianRentalADR * (projection.medOcc || 0);
            /* Rental revenue range: apply same fee ratio to P25/P75 */
            const _p25Rental = _computeRentalFromGross(projection.p25Revenue);
            const _p75Rental = _computeRentalFromGross(projection.p75Revenue);

            /* Per-scenario rental metrics for the scenario cards */
            const _scenarioRental = {};
            ['conservative','base','aggressive'].forEach(key => {
              const sc = projection.monthly[key];
              const mRows = sc.slice(0,12).map(row => {
                const on = row.occupiedNights || 0;
                const ls = row.los || 1;
                const st = ls > 0 ? on / ls : 0;
                const fees = on * _pn + st * _ps + row.revenue * (_pp / 100);
                return { netRev: row.revenue - fees, occNights: on, occ: row.occupancy };
              });
              const annRental = mRows.reduce((s,d) => s + d.netRev, 0);
              const totON = mRows.reduce((s,d) => s + d.occNights, 0);
              const rentalADR = totON > 0 ? annRental / totON : 0;
              _scenarioRental[key] = { annual: Math.round(annRental), adr: Math.round(rentalADR) };
            });

            return (
            <>
              {/* Market Summary */}
              <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:20}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                  <div style={{fontSize:15,fontWeight:700}}>Market Summary — {projection.compCount} comps</div>
                  {pmCompany.name && (
                    pmCompany.website
                      ? <a href={pmCompany.website.startsWith('http')?pmCompany.website:`https://${pmCompany.website}`} target="_blank" rel="noopener noreferrer" style={{background:'var(--accent-bg)',padding:'4px 12px',borderRadius:6,fontSize:12,fontWeight:600,color:'var(--accent)',textDecoration:'none'}}>{pmCompany.name} ↗</a>
                      : <div style={{background:'var(--accent-bg)',padding:'4px 12px',borderRadius:6,fontSize:12,fontWeight:600,color:'var(--accent)'}}>{pmCompany.name}</div>
                  )}
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
                  <Stat label="Median Rental Revenue" value={fmtUSD(Math.round(_medianRentalRev))} sub="Net of PM fees" color="var(--green)" />
                  <Stat label="Median ADR" value={fmtUSD(Math.round(_medianRentalADR))} sub="Rental basis" color="var(--blue)" />
                  <Stat label="Median Occupancy" value={fmtPct(projection.medOcc)} color="var(--yellow)" />
                  <Stat label="Median RevPAR" value={fmtUSD(Math.round(_medianRevPAR))} color="var(--accent)" />
                  <Stat label="Median LoS" value={projection.medLOS?projection.medLOS.toFixed(1)+' nights':'—'} />
                  <Stat label="Avg Rating" value={projection.avgRating?projection.avgRating.toFixed(2):'—'} sub={`${fmt(projection.avgReviews,0)} reviews`} />
                  <Stat label="Rental Revenue Range" value={`${fmtUSD(Math.round(_p25Rental))} – ${fmtUSD(Math.round(_p75Rental))}`} sub="P25 – P75" />
                </div>
              </div>

              {/* PM Fee Summary */}
              {(pmCompany.perStayFee || pmCompany.perNightFee || pmCompany.pctFee) && (
                <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:16,display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>PM Fees:</div>
                  {pmCompany.perStayFee && <div style={{background:'var(--surface2)',borderRadius:6,padding:'4px 12px',fontSize:12}}><b>${pmCompany.perStayFee}</b>/stay <span style={{color:'var(--text-muted)'}}>(cleaning fee, etc.)</span></div>}
                  {pmCompany.perNightFee && <div style={{background:'var(--surface2)',borderRadius:6,padding:'4px 12px',fontSize:12}}><b>${pmCompany.perNightFee}</b>/night</div>}
                  {pmCompany.pctFee && <div style={{background:'var(--surface2)',borderRadius:6,padding:'4px 12px',fontSize:12}}><b>{pmCompany.pctFee}%</b> of revenue</div>}
                </div>
              )}

              {/* Annual Revenue Scenarios */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
                {[
                  {key:'conservative', label:'Conservative', color:'var(--yellow)', icon:'🛡️', desc:'85% of median'},
                  {key:'base', label:'Base Case', color:'var(--accent)', icon:'📊', desc:'Median comp data'},
                  {key:'aggressive', label:'Aggressive', color:'var(--green)', icon:'🚀', desc:'115% of median'},
                ].map(s=>(
                  <div key={s.key} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:20,textAlign:'center'}}>
                    <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
                    <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{s.label}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{s.desc}</div>
                    <div style={{fontSize:26,fontWeight:800,color:s.color}}>{fmtUSD(_scenarioRental[s.key].annual)}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Annual Rental Revenue</div>
                    <div style={{fontSize:14,fontWeight:600,color:s.color,marginTop:6}}>{fmtUSD(Math.round(_scenarioRental[s.key].annual/12))}/mo</div>
                    <div style={{display:'flex',justifyContent:'center',gap:12,marginTop:8,fontSize:11,color:'var(--text-muted)'}}>
                      <span>ADR: <b style={{color:'var(--text)'}}>{fmtUSD(_scenarioRental[s.key].adr)}</b></span>
                      <span>Occ: <b style={{color:'var(--text)'}}>{fmtPct(projection.monthly[s.key].avgOcc)}</b></span>
                    </div>
                  </div>
                ))}
              </div>

              {/* ── Full Monthly Metrics Tables (transposed: months as columns, KPIs as rows) ── */}
              {['conservative','base','aggressive'].map((scenario) => {
                const colors = {conservative:'var(--yellow)',base:'var(--accent)',aggressive:'var(--green)'};
                const labels = {conservative:'Conservative',base:'Base Case',aggressive:'Aggressive'};
                const icons = {conservative:'🛡️',base:'📊',aggressive:'🚀'};
                const sc = projection.monthly[scenario];
                const hasFees = pmCompany.perStayFee || pmCompany.perNightFee || pmCompany.pctFee;
                const perNight = parseFloat(pmCompany.perNightFee) || 0;
                const perStay = parseFloat(pmCompany.perStayFee) || 0;
                const pctFee = parseFloat(pmCompany.pctFee) || 0;

                // Compute derived metrics for each month
                const derived = sc.slice(0,12).map(row => {
                  const grossRev = row.revenue;
                  const occNights = row.occupiedNights || 0;
                  const avgLos = row.los || 1;
                  const stays = avgLos > 0 ? occNights / avgLos : 0;
                  const nightFees = occNights * perNight;
                  const stayFees = stays * perStay;
                  const revFees = grossRev * (pctFee / 100);
                  const totalFees = nightFees + stayFees + revFees;
                  const netRev = grossRev - totalFees;
                  const rentalADR = occNights > 0 ? netRev / occNights : 0;
                  const rentalRevPAR = rentalADR * (row.occupancy || 0);
                  return { grossRev, occNights, avgLos, totalFees, netRev, nightFees, stayFees, revFees, rentalADR, rentalRevPAR };
                });
                const annualGross = derived.reduce((s,d)=>s+d.grossRev, 0);
                const annualOccNights = derived.reduce((s,d)=>s+d.occNights, 0);
                const annualFees = derived.reduce((s,d)=>s+d.totalFees, 0);
                const annualNet = annualGross - annualFees;
                const annualRentalADR = annualOccNights > 0 ? annualNet / annualOccNights : 0;
                const annualRentalRevPAR = annualRentalADR * (sc.avgOcc || 0);

                const thM = {padding:'8px 6px',textAlign:'right',fontSize:10,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.03em',borderBottom:'2px solid var(--border)',whiteSpace:'nowrap',minWidth:62};
                const tdM = {padding:'7px 6px',fontSize:11,textAlign:'right',borderBottom:'1px solid var(--border-light)',fontWeight:500,whiteSpace:'nowrap'};
                const labelTd = {padding:'7px 10px',fontSize:11,fontWeight:600,textAlign:'left',borderBottom:'1px solid var(--border-light)',whiteSpace:'nowrap',position:'sticky',left:0,background:'var(--surface)',zIndex:1};
                const totalTh = {...thM, borderLeft:'2px solid var(--border)', fontWeight:800, fontSize:11};
                const totalTd = {...tdM, borderLeft:'2px solid var(--border)', fontWeight:700};

                return (
                  <div key={scenario} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
                    <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span>{icons[scenario]}</span>
                        <div>
                          <div style={{fontSize:14,fontWeight:700}}>{labels[scenario]} — Monthly Breakdown</div>
                          <div style={{fontSize:11,color:'var(--text-muted)'}}>Annual Total: {fmtUSD(annualGross)}{hasFees ? ` · Rental: ${fmtUSD(annualNet)}` : ''}</div>
                        </div>
                      </div>
                    </div>
                    <div style={{overflowX:'auto'}}>
                      <table style={{width:'100%',borderCollapse:'collapse',minWidth:900}}>
                        <thead>
                          <tr style={{background:'var(--surface2)'}}>
                            <th style={{...thM,textAlign:'left',position:'sticky',left:0,background:'var(--surface2)',zIndex:2,minWidth:120}}></th>
                            {MONTHS.map(m=><th key={m} style={thM}>{m}</th>)}
                            <th style={totalTh}>Annual</th>
                          </tr>
                        </thead>
                        <tbody>
                          {/* Total ADR row */}
                          <tr>
                            <td style={labelTd}>Total ADR</td>
                            {sc.slice(0,12).map((row,i)=><td key={i} style={tdM}>{fmtUSD(row.adr)}</td>)}
                            <td style={totalTd}>{fmtUSD(sc.avgADR)}</td>
                          </tr>
                          {/* Occupancy row */}
                          <tr>
                            <td style={labelTd}>Occupancy</td>
                            {sc.slice(0,12).map((row,i)=><td key={i} style={tdM}>{row.occupancy!=null?(row.occupancy*100).toFixed(1)+'%':'—'}</td>)}
                            <td style={totalTd}>{fmtPct(sc.avgOcc)}</td>
                          </tr>
                          {/* Occupied Nights row */}
                          <tr>
                            <td style={labelTd}>Occupied Nights</td>
                            {derived.map((d,i)=><td key={i} style={tdM}>{d.occNights}</td>)}
                            <td style={totalTd}>{annualOccNights}</td>
                          </tr>
                          {/* Avg LoS row */}
                          <tr>
                            <td style={labelTd}>Avg LoS</td>
                            {sc.slice(0,12).map((row,i)=><td key={i} style={tdM}>{row.los!=null?row.los.toFixed(1):'—'}</td>)}
                            <td style={totalTd}>{sc.avgLOS?sc.avgLOS.toFixed(1):'—'}</td>
                          </tr>
                          {/* Total Revenue row (bold separator) */}
                          <tr style={{background:'var(--surface2)'}}>
                            <td style={{...labelTd,fontWeight:700,color:colors[scenario],borderTop:'2px solid var(--border)',background:'var(--surface2)'}}>Total Revenue</td>
                            {derived.map((d,i)=><td key={i} style={{...tdM,fontWeight:700,color:colors[scenario],borderTop:'2px solid var(--border)'}}>{fmtUSD(d.grossRev)}</td>)}
                            <td style={{...totalTd,fontWeight:800,color:colors[scenario],borderTop:'2px solid var(--border)'}}>{fmtUSD(annualGross)}</td>
                          </tr>
                          {/* Fee rows — only show if PM fees configured */}
                          {hasFees && <>
                            <tr>
                              <td style={{...labelTd,color:'var(--text-muted)',fontStyle:'italic',fontSize:10}}>PM Fees: Per Night</td>
                              {derived.map((d,i)=><td key={i} style={{...tdM,color:'var(--text-muted)',fontSize:10}}>({fmtUSD(Math.round(d.nightFees))})</td>)}
                              <td style={{...totalTd,color:'var(--text-muted)',fontSize:10}}>({fmtUSD(Math.round(derived.reduce((s,d)=>s+d.nightFees,0)))})</td>
                            </tr>
                            <tr>
                              <td style={{...labelTd,color:'var(--text-muted)',fontStyle:'italic',fontSize:10}}>PM Fees: Per Stay</td>
                              {derived.map((d,i)=><td key={i} style={{...tdM,color:'var(--text-muted)',fontSize:10}}>({fmtUSD(Math.round(d.stayFees))})</td>)}
                              <td style={{...totalTd,color:'var(--text-muted)',fontSize:10}}>({fmtUSD(Math.round(derived.reduce((s,d)=>s+d.stayFees,0)))})</td>
                            </tr>
                            <tr>
                              <td style={{...labelTd,color:'var(--text-muted)',fontStyle:'italic',fontSize:10}}>PM Fees: % Revenue</td>
                              {derived.map((d,i)=><td key={i} style={{...tdM,color:'var(--text-muted)',fontSize:10}}>({fmtUSD(Math.round(d.revFees))})</td>)}
                              <td style={{...totalTd,color:'var(--text-muted)',fontSize:10}}>({fmtUSD(Math.round(derived.reduce((s,d)=>s+d.revFees,0)))})</td>
                            </tr>
                            <tr style={{background:'var(--surface2)'}}>
                              <td style={{...labelTd,fontWeight:700,borderTop:'2px solid var(--border)',background:'var(--surface2)'}}>Total Fees</td>
                              {derived.map((d,i)=><td key={i} style={{...tdM,fontWeight:600,borderTop:'2px solid var(--border)'}}>({fmtUSD(Math.round(d.totalFees))})</td>)}
                              <td style={{...totalTd,fontWeight:700,borderTop:'2px solid var(--border)'}}>({fmtUSD(Math.round(annualFees))})</td>
                            </tr>
                            <tr style={{background:'var(--surface2)'}}>
                              <td style={{...labelTd,fontWeight:700,color:colors[scenario],background:'var(--surface2)'}}>Rental Revenue</td>
                              {derived.map((d,i)=><td key={i} style={{...tdM,fontWeight:700,color:colors[scenario]}}>{fmtUSD(Math.round(d.netRev))}</td>)}
                              <td style={{...totalTd,fontWeight:800,color:colors[scenario]}}>{fmtUSD(Math.round(annualNet))}</td>
                            </tr>
                            <tr>
                              <td style={{...labelTd,fontSize:10}}>ADR</td>
                              {derived.map((d,i)=><td key={i} style={{...tdM,fontSize:10}}>{fmtUSD(Math.round(d.rentalADR))}</td>)}
                              <td style={{...totalTd,fontSize:10}}>{fmtUSD(Math.round(annualRentalADR))}</td>
                            </tr>
                            <tr>
                              <td style={{...labelTd,fontSize:10}}>RevPAR</td>
                              {derived.map((d,i)=><td key={i} style={{...tdM,fontSize:10}}>{fmtUSD(Math.round(d.rentalRevPAR))}</td>)}
                              <td style={{...totalTd,fontSize:10}}>{fmtUSD(Math.round(annualRentalRevPAR))}</td>
                            </tr>
                          </>}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}

            {/* Generate Report CTA */}
            <div style={{marginTop:20,textAlign:'center'}}>
              <button onClick={()=>setView('report')} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:10,padding:'14px 40px',fontSize:15,fontWeight:700,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:8}}>
                Generate Report →
              </button>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>Create a professional PDF with these projections</div>
            </div>
            </>
            );
          })() : (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:60,textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:10}}>📊</div>
              <div style={{fontSize:15,fontWeight:600}}>No projection data</div>
              <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>Search for comps and select at least {MIN_COMPS} to generate projections.</div>
            </div>
          )}
        </div>
      )}

      {/* ════ HISTORY ════ */}
      {view==='history'&&(
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
          <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:15,fontWeight:700}}>Search History</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{searchHistory.length} saved searches</div>
            </div>
          </div>
          {searchHistory.length === 0 ? (
            <div style={{padding:60,textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:10}}>🕐</div>
              <div style={{fontSize:15,fontWeight:600}}>No searches yet</div>
              <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>Your searches will be saved automatically.</div>
            </div>
          ) : (
            <div>
              {searchHistory.map(s => (
                <div key={s.id} onClick={()=>loadSavedSearch(s.id)}
                  style={{display:'flex',alignItems:'center',gap:14,padding:'14px 20px',borderBottom:'1px solid var(--border-light)',cursor:'pointer',transition:'background .1s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{width:40,height:40,borderRadius:8,background:'var(--accent-bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>📍</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.address || `${s.lat?.toFixed(4)}, ${s.lng?.toFixed(4)}`}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                      {new Date(s.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}
                      {' · '}{s.comp_count} comps{s.radius ? ` · ${(s.radius/1000).toFixed(1)}km radius` : ''}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                    <span style={{background:'var(--accent-bg)',color:'var(--accent)',padding:'3px 10px',borderRadius:5,fontSize:11,fontWeight:600}}>{s.comp_count} comps</span>
                    <button onClick={(e)=>deleteSavedSearch(s.id,e)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:14,padding:4}} title="Delete">✕</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ─── Report ─── */}
      {view==='report' && <ReportPanel projection={projection} comps={comps} selectedComps={selectedComps} pmCompany={pmCompany} address={address} assumptions={assumptions} seasonality={seasonality} />}

      {/* ─── Profile ─── */}
      {view==='profile' && <ProfilePanel authUser={authUser} onLogout={onLogout} setAuthUser={setAuthUser} />}

      {/* Admin panel moved into ProfilePanel for admins */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthGate />);
</script>
</body>
</html>
